  # ═══════════════════════════ SURFSCORES ═══════════════════════════

  /surfscores/sync/{circuitId}:
    parameters:
      - $ref: '#/components/parameters/CircuitId'
    post:
      tags: [SurfScores]
      summary: Sincronizar ranking de un circuito con surfscores.com
      description: >
        El BFF autentica contra surfscores.com/api/v1/users/login con credenciales
        almacenadas en servidor (nunca expuestas al cliente Angular).
        Resultado guardado en caché. Prohibido usar como live heatboard.
      responses:
        '200':
          description: Sincronización exitosa
          content:
            application/json:
              schema:
                type: object
                properties:
                  syncedAt:
                    type: string
                    format: date-time
                  recordsUpdated:
                    type: integer
                  circuitCode:
                    type: string
                    example: ALAS-OPEN-26
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          description: Rate limit de SurfScores alcanzado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Error al conectar con la API de SurfScores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

# ═══════════════════════════════════════════════════════════════════
# COMPONENTS
# ═══════════════════════════════════════════════════════════════════
components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ─── PARAMETERS ───────────────────────────────────────────────
  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
    CircuitId:
      name: circuitId
      in: path
      required: true
      schema:
        type: string
        example: open26
    EventId:
      name: eventId
      in: path
      required: true
      schema:
        type: string
        example: evt-rbc-2026
    CategoryId:
      name: categoryId
      in: path
      required: true
      schema:
        type: string
        example: open-hombres
    CompetitorId:
      name: competitorId
      in: path
      required: true
      schema:
        type: string
        example: comp-br-2310
    InscriptionId:
      name: inscriptionId
      in: path
      required: true
      schema:
        type: string
        example: ins-00123
    PaymentId:
      name: paymentId
      in: path
      required: true
      schema:
        type: string
        example: pay-00456
    TokenId:
      name: tokenId
      in: path
      required: true
      schema:
        type: string
        example: tok-00789
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        example: usr-001

  # ─── REUSABLE RESPONSES ───────────────────────────────────────
  responses:
    BadRequest:
      description: Error de validación en la solicitud
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
    Unauthorized:
      description: No autenticado o token inválido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  # ─── SCHEMAS ──────────────────────────────────────────────────
  schemas:

    # ── ENUMS ─────────────────────────────────────────────────────

    CircuitStatus:
      type: string
      enum: [Activo, Borrador, Archivado, Próximo]

    CircuitRegion:
      type: string
      enum: [Latinoamérica, América del Sur, América Central, América del Norte]

    CircuitModalidad:
      type: string
      enum: [Shortboard, Longboard, Mixed]

    EventStatusPublic:
      type: string
      enum: [Inscripciones Abiertas, Próximamente, Completado, Cerrado]

    EventStatusAdmin:
      type: string
      enum: [Activo, Próximamente, Completado, Cancelado, Borrador]

    EventAccessType:
        type: string
        enum: [Abierto, Restringido, Solo invitación]

    EventType:
        type: string
        enum: [Regular, Prime, SuperPrime]

    CategoryStatus:
      type: string
      enum: [Activo, Inactivo]

    CategoryGender:
      type: string
      enum: [Masculino, Femenino, Ambos]

    InscriptionStatusAdmin:
      type: string
      enum: [Pagado, Pendiente]

    InscriptionStatusCompetitor:
      type: string
      enum: [confirmado, pendiente, completado]

    PaymentMethodEnum:
      type: string
      enum: [paypal, beach]

    PaymentStatusAdmin:
      type: string
      enum: [Confirmado, Pendiente]

    LicenseStatus:
      type: string
      enum: [Activa, Pendiente de validación]

    TokenHistoryStatus:
      type: string
      enum: [Usado, Expirado, Rechazado, Pendiente]

    AdminRole:
      type: string
      enum: [Super Admin, Admin, Árbitro, Revisor]

    AdminUserStatus:
      type: string
      enum: [Activo, Inactivo]

    MembershipPlan:
      type: string
      enum: [Mensual, Por evento]

    MembershipStatus:
      type: string
      enum: [Activo, Vence pronto]

    ArticleCategory:
      type: string
      enum: [Resultados, Circuito, Entrevista, Reglamento, Tecnología]

    ShirtSize:
      type: string
      enum: [XS, S, M, L, XL, XXL]

    Postura:
      type: string
      enum: [Regular, Goofy]

    UserType:
      type: string
      enum: [espectador, competidor]

    PreferredLanguage:
      type: string
      enum: [Español, Português, English]

    PermissionLevel:
      type: string
      enum: [full, read-only, none]

    AdminModule:
      type: string
      enum: [Dashboard, Usuarios, Circuitos, Eventos, Categorías, Inscritos, Pagos, Tokens, Configuración]

    # ── AUTH ──────────────────────────────────────────────────────

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: gabriel.villani@surf.com
        password:
          type: string
          minLength: 8
        rememberMe:
          type: boolean
          default: false

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT Bearer token
        expiresIn:
          type: integer
          example: 3600
          description: Segundos hasta expiración
        user:
          $ref: '#/components/schemas/AuthenticatedUser'

    AuthenticatedUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        fullName:
          type: string
        tipo:
          $ref: '#/components/schemas/UserType'
        adminRole:
          $ref: '#/components/schemas/AdminRole'
          nullable: true

    RegisterRequest:
      type: object
      required: [email, password, nombre, apellido, tipo, terminos]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          description: Mínimo 8 caracteres, 1 mayúscula, 1 dígito
        nombre:
          type: string
        apellido:
          type: string
        tipo:
          $ref: '#/components/schemas/UserType'
        pais:
          type: string
          example: Brasil
        idiomaPreferido:
          $ref: '#/components/schemas/PreferredLanguage'
        newsletter:
          type: boolean
          default: true
        terminos:
          type: boolean
          description: Debe ser true para completar el registro
        reglamento:
          type: boolean
          description: Requerido sólo cuando tipo = competidor
        fechaNacimiento:
          type: string
          format: date
          description: Requerido cuando tipo = competidor
        genero:
          $ref: '#/components/schemas/CategoryGender'
        telefono:
          type: string
          example: '+55 11 9 8765-4321'
        club:
          type: string
        postura:
          $ref: '#/components/schemas/Postura'
        tallaCamiseta:
          $ref: '#/components/schemas/ShirtSize'
        federacion:
          type: string
        patrocinadores:
          type: string

    RegisterResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        tipo:
          $ref: '#/components/schemas/UserType'
        licenseStatus:
          $ref: '#/components/schemas/LicenseStatus'
          nullable: true
          description: Solo presente cuando tipo = competidor; valor inicial "Pendiente de validación"
        message:
          type: string
          example: Registro exitoso. Tu licencia será validada en las próximas 48 horas.

    PasswordResetRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    PasswordResetConfirmRequest:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
          description: Token recibido por correo; expira en 30 minutos
        newPassword:
          type: string
          minLength: 8

    # ── CIRCUITS ──────────────────────────────────────────────────

    CircuitRequest:
      type: object
      required: [nombre, temporada, modalidad, region]
      properties:
        nombre:
          type: string
          example: ALAS Open
        temporada:
          type: integer
          minimum: 2020
          maximum: 2030
          example: 2026
        descripcion:
          type: string
        region:
          $ref: '#/components/schemas/CircuitRegion'
        modalidad:
          $ref: '#/components/schemas/CircuitModalidad'
        estado:
          $ref: '#/components/schemas/CircuitStatus'
          default: Borrador
        surfScoresCode:
          type: string
          example: ALAS-OPEN-26

    CircuitResponse:
      allOf:
        - $ref: '#/components/schemas/CircuitRequest'
        - type: object
          properties:
            id:
              type: string
              example: open26
            eventsCount:
              type: integer
            competidoresCount:
              type: integer
            totalPrizeUsd:
              type: number
              format: float
            lastSyncAt:
              type: string
              format: date-time
              nullable: true
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    CircuitListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CircuitResponse'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    # ── EVENTS ────────────────────────────────────────────────────

    EventRequest:
      type: object
      required: [nombre, circuitId, fechaInicio, fechaFin, pais, ciudad, playa, stars]
      properties:
        nombre:
          type: string
          example: Roca Bruja Classic
        circuitId:
          type: string
          example: open26
        fechaInicio:
          type: string
          format: date
          example: '2026-07-12'
        fechaFin:
          type: string
          format: date
          example: '2026-07-15'
        pais:
          type: string
          example: Perú
        ciudad:
          type: string
          example: Chicama
        playa:
          type: string
          example: Roca Bruja
        auspiciador:
          type: string
          nullable: true
          example: Monster Energy
        stars:
          type: integer
          minimum: 1
          maximum: 7
          example: 3
        capacidadMaxima:
          type: integer
          example: 60
        prizeAmountUsd:
          type: number
          format: float
          example: 5000
        imagenUrl:
          type: string
          nullable: true
          example: https://cdn.alas.app/events/roca-bruja-2026-poster.jpg
        surfScoresCode:
          type: string
          example: RBC-2026-PER
        eventType:
          $ref: '#/components/schemas/EventType'
          default: Regular
        accessType:
          $ref: '#/components/schemas/EventAccessType'
        estado:
          $ref: '#/components/schemas/EventStatusAdmin'
          default: Borrador

    EventResponse:
      allOf:
        - $ref: '#/components/schemas/EventRequest'
        - type: object
          properties:
            id:
              type: string
              example: evt-rbc-2026
            enrolledCount:
              type: integer
            statusPublic:
              $ref: '#/components/schemas/EventStatusPublic'
            lugar:
              type: string
              example: Chicama, Perú
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    EventListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/EventResponse'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    EventCategoryRequest:
      type: object
      required: [categoryId]
      properties:
        categoryId:
          type: string
        stars:
          type: integer
          minimum: 1
          maximum: 7
          nullable: true
          description: null hereda el nivel de estrellas del evento
        customTariffUsd:
          type: number
          format: float
          nullable: true
          description: null hereda tarifa del circuito
        capacidad:
          type: integer
          nullable: true

    EventCategoryResponse:
      allOf:
        - $ref: '#/components/schemas/EventCategoryRequest'
        - type: object
          properties:
            categoryName:
              type: string
            gender:
              $ref: '#/components/schemas/CategoryGender'
            effectiveTariffUsd:
              type: number
              format: float
            enrolledCount:
              type: integer

    EventCategoryListResponse:
      type: object
      properties:
        useCircuitTariffs:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/EventCategoryResponse'

    # ── CATEGORIES ────────────────────────────────────────────────

    CategoryRequest:
      type: object
      required: [nombre, gender]
      properties:
        nombre:
          type: string
          example: Open Hombres
        descripcion:
          type: string
        gender:
          $ref: '#/components/schemas/CategoryGender'
        ageRestriction:
          type: boolean
          default: false
        minAge:
          type: integer
          nullable: true
        maxAge:
          type: integer
          nullable: true
        successorCategoryId:
          type: string
          nullable: true
          description: ID de la categoría a la que el competidor pasa al superar el límite de edad (Sub-18 → Open)
        status:
          $ref: '#/components/schemas/CategoryStatus'
          default: Activo
        membresiaAnualUsd:
          type: number
          format: float
          minimum: 0
          default: 0
          description: Importe de membresia anual en USD para la categoria.
          membresiaPorEventoUsd:
            type: number
            format: float
            minimum: 0
            default: 0
            description: Importe de membresia por evento en USD para la categoria.
          bestResultsCount:
            type: integer
            nullable: true
            minimum: 1
            maximum: 10
            default: 5
            description: Cantidad de mejores resultados que cuentan para el ranking de esta categoría en el circuito actual.
          surfScoresCode:
            type: string
          nullable: true
          description: Codigo opcional de la categoria en SurfScores.

    CategoryResponse:
      allOf:
        - $ref: '#/components/schemas/CategoryRequest'
        - type: object
          properties:
            id:
              type: string
              example: open-hombres
            successorCategory:
              type: object
              nullable: true
              properties:
                id:
                  type: string
                nombre:
                  type: string
            createdAt:
              type: string
              format: date-time

    TariffRequest:
      type: object
      required: [usd, cop]
      properties:
        usd:
          type: number
          format: float
          example: 75
        cop:
          type: number
          format: float
          example: 308000
        active:
          type: boolean
          default: true

    TariffResponse:
      allOf:
        - $ref: '#/components/schemas/TariffRequest'
        - type: object
          properties:
            starLevel:
              type: integer
              minimum: 1
              maximum: 7

    # ── COMPETITORS ───────────────────────────────────────────────

    CompetitorRequest:
      type: object
      required: [nombre, apellido, email, pais, fechaNacimiento]
      properties:
        nombre:
          type: string
        apellido:
          type: string
        email:
          type: string
          format: email
        fechaNacimiento:
          type: string
          format: date
          example: '1998-04-22'
        genero:
          type: string
          enum: [Masculino, Femenino, Prefiero no indicar]
        pais:
          type: string
          example: Brasil
        telefono:
          type: string
          example: '+55 11 9 8765-4321'
        club:
          type: string
        postura:
          $ref: '#/components/schemas/Postura'
        tallaCamiseta:
          $ref: '#/components/schemas/ShirtSize'
        numeroCamiseta:
          type: string
          example: '#23'
        patrocinadores:
          type: string
        federacion:
          type: string

    CompetitorResponse:
      allOf:
        - $ref: '#/components/schemas/CompetitorRequest'
        - type: object
          properties:
            id:
              type: string
              example: comp-br-2310
            surfScoresCode:
              type: string
              example: SS-BR-2310
              description: Asignado por el sistema; no editable por el usuario
            license:
              $ref: '#/components/schemas/LicenseInfo'
            createdAt:
              type: string
              format: date-time

    LicenseInfo:
      type: object
      properties:
        number:
          type: string
          example: BR-2310
        numberLong:
          type: string
          example: BRA-2026-0142
        status:
          $ref: '#/components/schemas/LicenseStatus'
        expirationDate:
          type: string
          format: date
        enabledCategories:
          type: array
          items:
            type: string

    CompetitorListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CompetitorResponse'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    NotificationPreferencesRequest:
      type: object
      properties:
        email:
          type: boolean
        push:
          type: boolean
        resultados:
          type: boolean
        inscripciones:
          type: boolean

    NotificationPreferencesResponse:
      allOf:
        - $ref: '#/components/schemas/NotificationPreferencesRequest'
        - type: object
          properties:
            tokens:
              type: boolean
              description: Siempre true; no configurable por el usuario

    CalendarEventResponse:
      type: object
      properties:
        eventId:
          type: string
        nombre:
          type: string
        lugar:
          type: string
        fechaInicio:
          type: string
          format: date
        fechaFin:
          type: string
          format: date
        categoria:
          type: string
        inscriptionStatus:
          $ref: '#/components/schemas/InscriptionStatusCompetitor'
        stars:
          type: integer

    # ── INSCRIPTIONS ──────────────────────────────────────────────

    InscriptionRequest:
      type: object
      required: [competitorId, eventId, categoryId, paymentMethod, reglamento, riesgosAceptados, usoImagenAceptado]
      properties:
        competitorId:
          type: string
        eventId:
          type: string
        categoryId:
          type: string
        shirtNumber:
          type: string
          example: '#23'
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethodEnum'
        reglamento:
          type: boolean
          description: El competidor acepta el reglamento ALAS
        riesgosAceptados:
          type: boolean
          description: El competidor acepta los riesgos propios de una competencia de surf
        usoImagenAceptado:
          type: boolean
          description: El competidor autoriza el uso de fotos y videos del evento

    InscriptionUpdateRequest:
      type: object
      properties:
        shirtNumber:
          type: string
        estadoAdmin:
          $ref: '#/components/schemas/InscriptionStatusAdmin'
        notes:
          type: string

    InscriptionResponse:
      type: object
      properties:
        id:
          type: string
          example: ins-00123
        competitor:
          type: object
          properties:
            id:
              type: string
            fullName:
              type: string
            country:
              type: string
        event:
          type: object
          properties:
            id:
              type: string
            nombre:
              type: string
            lugar:
              type: string
        category:
          type: object
          properties:
            id:
              type: string
            nombre:
              type: string
        circuit:
          type: object
          properties:
            id:
              type: string
            nombre:
              type: string
        shirtNumber:
          type: string
          nullable: true
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethodEnum'
        baseAmountUsd:
          type: number
          format: float
          description: Monto base de la inscripción antes de la cuota administrativa.
        administrativeFeeUsd:
          type: number
          format: float
          nullable: true
          description: Cuota administrativa aplicada. Si es null, no debe mostrarse en el resumen.
        montoUsd:
          type: number
          format: float
        estadoAdmin:
          $ref: '#/components/schemas/InscriptionStatusAdmin'
        estadoCompetidor:
          $ref: '#/components/schemas/InscriptionStatusCompetitor'
        resultado:
          type: string
          nullable: true
          example: 3° lugar · 920 pts
        reglamentoAceptado:
          type: boolean
        riesgosAceptados:
          type: boolean
        transaccionId:
          type: string
          nullable: true
        usoImagenAceptado:
          type: boolean
        inscripcionAt:
          type: string
          format: date-time

    InscriptionListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/InscriptionResponse'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    AdminInscriptionRow:
      type: object
      properties:
        id:
          type: string
        competitorId:
          type: string
        sequentialNumber:
          type: string
          description: Número secuencial de 3 dígitos (e.g., "001")
          example: '007'
        fullName:
          type: string
        country:
          type: string
        ranking2025:
          type: string
          nullable: true
          example: '3°'
        ranking2026:
          type: string
          nullable: true
        categoria:
          type: string
        eventoNombre:
          type: string
        inscripcionDate:
          type: string
          format: date
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethodEnum'
        montoUsd:
          type: number
          format: float
        estadoAdmin:
          $ref: '#/components/schemas/InscriptionStatusAdmin'
        federacion:
          type: string
        licenciaNumber:
          type: string
        transaccionId:
          type: string
          nullable: true
        notas:
          type: string
          nullable: true

    AdminInscriptionListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AdminInscriptionRow'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    # ── PAYMENTS ──────────────────────────────────────────────────

    PaymentRequest:
      type: object
      required: [inscriptionId, method, amountUsd, transactionId]
      properties:
        inscriptionId:
          type: string
        method:
          $ref: '#/components/schemas/PaymentMethodEnum'
        amountUsd:
          type: number
          format: float
        transactionId:
          type: string
          description: "PayPal: PP-XXXXXXXX | Beach token: XXXX-XXXX"
          example: PP-9X8C7B2A

    PaymentUpdateRequest:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/PaymentStatusAdmin'
        notes:
          type: string

    PaymentResponse:
      type: object
      properties:
        id:
          type: string
          example: pay-00456
        fecha:
          type: string
          format: date
        competidor:
          type: string
        evento:
          type: string
        categoria:
          type: string
        montoUsd:
          type: number
          format: float
        metodo:
          $ref: '#/components/schemas/PaymentMethodEnum'
        transaccionId:
          type: string
        estado:
          $ref: '#/components/schemas/PaymentStatusAdmin'
        createdAt:
          type: string
          format: date-time

    PaymentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PaymentResponse'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    PaymentKpiResponse:
      type: object
      properties:
        totalRecaudadoMes:
          type: number
          format: float
        tendenciaPercent:
          type: integer
          description: Variación porcentual respecto al mes anterior
        pagoPaypalConfirmados:
          type: object
          properties:
            amountUsd:
              type: number
            count:
              type: integer
        pagosPlayaValidados:
          type: object
          properties:
            amountUsd:
              type: number
            count:
              type: integer
            pendingCount:
              type: integer
        membresiasActivas:
          type: object
          properties:
            amountUsd:
              type: number
            count:
              type: integer

    # ── BEACH TOKENS ──────────────────────────────────────────────

    BeachTokenRequest:
      type: object
      required: [inscriptionId]
      properties:
        inscriptionId:
          type: string
          description: El token aprobado es válido para todas las categorías del mismo proceso de inscripción

    BeachTokenPendingResponse:
      type: object
      properties:
        requestId:
          type: string
        status:
          type: string
          enum: [pending]
        message:
          type: string
          example: Solicitud enviada. El administrador aprobará tu token en breve.

    BeachTokenRedeemRequest:
      type: object
      required: [inscriptionId, tokenCode]
      properties:
        inscriptionId:
          type: string
        tokenCode:
          type: string
          pattern: '^[A-Z0-9]{4}-[A-Z0-9]{4}$'
          example: A3K9-Z2MX

    BeachTokenRedeemResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success]
        reference:
          type: string
          example: ALAS-RBC-2026-0048
        evento:
          type: string
        categoria:
          type: string
        montoUsd:
          type: number
        financialStatus:
          type: string
          enum: [pendiente]
          description: Estado financiero pendiente; se validará presencialmente en el evento

    BeachTokenErrorResponse:
      type: object
      properties:
        error:
          type: string
          enum: [token_expired, token_invalid, token_already_used, token_rejected]
        message:
          type: string
        issuedAt:
          type: string
          format: date-time
          nullable: true
        expiredAt:
          type: string
          format: date-time
          nullable: true

    BeachTokenAdminResponse:
      type: object
      properties:
        id:
          type: string
        competitorName:
          type: string
        competitorEmail:
          type: string
          format: email
        event:
          type: string
        category:
          type: string
        amountUsd:
          type: number
        tokenCode:
          type: string
          nullable: true
          description: Presente sólo cuando status = Usado o recién aprobado
        status:
          $ref: '#/components/schemas/TokenHistoryStatus'
        generadoAt:
          type: string
          format: date-time
          nullable: true
        expiracionAt:
          type: string
          format: date-time
          nullable: true
        usadoEn:
          type: string
          format: date-time
          nullable: true

    BeachTokenAdminListResponse:
      type: object
      properties:
        pendingRequests:
          type: array
          items:
            $ref: '#/components/schemas/BeachTokenAdminResponse'
        history:
          type: array
          items:
            $ref: '#/components/schemas/BeachTokenAdminResponse'
        dailyStats:
          type: object
          properties:
            pendingCount:
              type: integer
            approvedToday:
              type: integer
            rejectedToday:
              type: integer
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    # ── RANKINGS ──────────────────────────────────────────────────

    RankingEntry:
      type: object
      properties:
        pos:
          type: integer
          example: 1
        name:
          type: string
        country:
          type: string
          example: Perú
        points:
          type: integer
          example: 9860
        events:
          type: integer
        variation:
          type: integer
          nullable: true
          description: Variación de posición vs. semana anterior (positivo = subió)

    RankingResponse:
      type: object
      properties:
        categoryId:
          type: string
        categoryName:
          type: string
        year:
          type: integer
        cachedAt:
          type: string
          format: date-time
        attribution:
          type: string
          example: Results by SurfScores.com
          description: Campo obligatorio por contrato con SurfScores; debe mostrarse en toda UI que presente estos datos
        data:
          type: array
          items:
            $ref: '#/components/schemas/RankingEntry'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    # ── POINTS HISTORY ────────────────────────────────────────────

    PointsHistoryEntry:
      type: object
      properties:
        eventoId:
          type: string
        eventoNombre:
          type: string
        ubicacion:
          type: string
          example: Chicama, Perú
        stars:
          type: integer
        fechaInicio:
          type: string
          format: date
        fechaFin:
          type: string
          format: date
        categoria:
          type: string
        puesto:
          type: string
          example: '1°'
        puntos:
          type: integer
        cuenta:
          type: boolean
          description: True si este resultado cuenta para el total del ranking (regla de los 5 mejores)

    PointsHistoryResponse:
      type: object
      properties:
        competitorId:
          type: string
        temporada:
          type: integer
        categoryId:
          type: string
        stats:
          type: object
          properties:
            posicion:
              type: string
              example: '#4'
            puntosAcumulados:
              type: integer
            eventosDisputados:
              type: integer
            totalEventos:
              type: integer
            mejorResultado:
              type: string
              example: '1°'
            mejorResultadoEvento:
              type: string
        attribution:
          type: string
          example: Results by SurfScores.com
        data:
          type: array
          items:
            $ref: '#/components/schemas/PointsHistoryEntry'

    # ── EVENT RESULTS ──────────────────────────────────────────────

    EventResultRequest:
      type: object
      required: [competitorId, place, ligaPoints]
      properties:
        competitorId:
          type: string
        place:
          type: string
          example: '1°'
        ligaPoints:
          type: integer
        prizeUsd:
          type: number
          format: float
          nullable: true
        heatOla1:
          type: number
          format: float
          nullable: true
        heatOla2:
          type: number
          format: float
          nullable: true

    EventResultResponse:
      allOf:
        - $ref: '#/components/schemas/EventResultRequest'
        - type: object
          properties:
            id:
              type: string
            competitorName:
              type: string
            country:
              type: string
            heatScoreTotal:
              type: number
              format: float
              nullable: true
              description: Suma de ola1 + ola2

    PrizeDistributionRow:
      type: object
      properties:
        placeLabel:
          type: string
          example: '1°'
        prizeUsd:
          type: number
          format: float
          description: Premio en USD para el nivel de estrellas del evento

    # ── ARTICLES ──────────────────────────────────────────────────

    ArticleRequest:
      type: object
      required: [titulo, categoria]
      properties:
        titulo:
          type: string
        resumen:
          type: string
        categoria:
          $ref: '#/components/schemas/ArticleCategory'
        autor:
          type: string
        autorTitulo:
          type: string
          example: Periodista ALAS
        imagenUrl:
          type: string
        tags:
          type: array
          items:
            type: string
        featured:
          type: boolean
          default: false
        relatedEventId:
          type: string
          nullable: true

    ArticleResponse:
      allOf:
        - $ref: '#/components/schemas/ArticleRequest'
        - type: object
          properties:
            slug:
              type: string
              example: gabriel-villani-roca-bruja-classic
            fechaPublicacion:
              type: string
              format: date
            tiempoLecturaMin:
              type: integer

    ArticleListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ArticleResponse'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    # ── ADMIN USERS ───────────────────────────────────────────────

    AdminUserRequest:
      type: object
      required: [nombre, apellido, email, rol]
      properties:
        nombre:
          type: string
        apellido:
          type: string
        email:
          type: string
          format: email
        rol:
          $ref: '#/components/schemas/AdminRole'
        sendInvitationEmail:
          type: boolean
          default: true

    AdminUserUpdateRequest:
      type: object
      properties:
        rol:
          $ref: '#/components/schemas/AdminRole'
        status:
          $ref: '#/components/schemas/AdminUserStatus'

    AdminUserResponse:
      type: object
      properties:
        id:
          type: string
        initials:
          type: string
          example: GV
        fullName:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/AdminRole'
        status:
          $ref: '#/components/schemas/AdminUserStatus'
        lastSession:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    AdminUserListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AdminUserResponse'

    RolePermission:
      type: object
      properties:
        module:
          $ref: '#/components/schemas/AdminModule'
        level:
          $ref: '#/components/schemas/PermissionLevel'

    RoleResponse:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/AdminRole'
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/RolePermission'

    RoleListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/RoleResponse'

    RolePermissionsUpdateRequest:
      type: object
      required: [permissions]
      properties:
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/RolePermission'

    # ── MEMBERSHIPS ───────────────────────────────────────────────

    MembershipRequest:
      type: object
      required: [clubFederacion, pais, plan, emailContacto]
      properties:
        clubFederacion:
          type: string
        pais:
          type: string
        plan:
          $ref: '#/components/schemas/MembershipPlan'
        inicioVigencia:
          type: string
          format: date
        vencimiento:
          type: string
          format: date
        emailContacto:
          type: string
          format: email

    MembershipResponse:
      allOf:
        - $ref: '#/components/schemas/MembershipRequest'
        - type: object
          properties:
            id:
              type: string
            competidoresAfiliados:
              type: integer
            estado:
              $ref: '#/components/schemas/MembershipStatus'
            createdAt:
              type: string
              format: date-time

    MembershipListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/MembershipResponse'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    # ── DASHBOARD ─────────────────────────────────────────────────

    DashboardResponse:
      type: object
      properties:
        kpis:
          type: object
          properties:
            totalCompetidores:
              type: integer
            totalEventosActivos:
              type: integer
            totalInscripciones:
              type: integer
            recaudacionMesUsd:
              type: number
              format: float
            tokensPendientes:
              type: integer
        activeEvents:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              nombre:
                type: string
              fechaInicio:
                type: string
                format: date
              estado:
                $ref: '#/components/schemas/EventStatusAdmin'
              inscritosCount:
                type: integer
        recentInscriptions:
          type: array
          items:
            type: object
            properties:
              competitorName:
                type: string
              evento:
                type: string
              categoria:
                type: string
              inscripcionAt:
                type: string
                format: date-time

    # ── SHARED ────────────────────────────────────────────────────

    PaginationMeta:
      type: object
      properties:
        currentPage:
          type: integer
        totalPages:
          type: integer
        totalItems:
          type: integer
        itemsPerPage:
          type: integer

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    ValidationErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
        fields:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
        timestamp:
          type: string
          format: date-time
